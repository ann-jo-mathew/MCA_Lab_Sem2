<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students</title>
</head>
<body>
    <h2>Student List</h2>
    {% if students %}
        <ul>
            {% for s in students%}
                <li>{{s.name}} - {{s.age}}</li>
            {% endfor %}
        </ul>
    {% else %}
        <p>No students found.</p>
    {% endif %}
</body>
</html>
