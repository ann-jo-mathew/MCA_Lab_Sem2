<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bootstrap 5 Login & Registration</title>

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background: #f4f6f9; }
    .auth-card { border: 0; border-radius: 16px; }
  </style>
</head>
<body>

  <div class="container py-5">
    <div class="row justify-content-center">
      <!-- Main responsive grid: left info + right forms -->
      <div class="col-12 col-lg-10">
        <div class="row g-4 align-items-stretch">
          
          <!-- Left side (Info) -->
          <div class="col-12 col-md-5">
            <div class="h-100 p-4 text-white rounded-4" style="background: #0d6efd;">
              <h3 class="mb-3">Welcome</h3>
              <p class="mb-0">
                This is a responsive Bootstrap 5 page using the grid system.
                On mobile, sections stack. On larger screens, they appear side-by-side.
              </p>
              <hr class="my-4">
              <ul class="mb-0">
                <li>Bootstrap 5 Grid</li>
                <li>Login Form</li>
                <li>Registration Form</li>
                <li>Responsive Layout</li>
              </ul>
            </div>
          </div>

          <!-- Right side (Forms) -->
          <div class="col-12 col-md-7">
            <div class="card auth-card shadow-sm h-100">
              <div class="card-body p-4">
                
                <!-- Tabs -->
                <ul class="nav nav-pills mb-3" id="authTabs" role="tablist">
                  <li class="nav-item" role="presentation">
                    <button class="nav-link active" id="login-tab" data-bs-toggle="pill" data-bs-target="#login"
                      type="button" role="tab">Login</button>
                  </li>
                  <li class="nav-item" role="presentation">
                    <button class="nav-link" id="register-tab" data-bs-toggle="pill" data-bs-target="#register"
                      type="button" role="tab">Register</button>
                  </li>
                </ul>

                <!-- Tab Content -->
                <div class="tab-content">
                  
                  <!-- Login Form -->
                  <div class="tab-pane fade show active" id="login" role="tabpanel">
                    <h4 class="mb-3">Login</h4>
                    <form>
                      <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" placeholder="Enter email" required>
                      </div>

                      <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-control" placeholder="Enter password" required>
                      </div>

                      <div class="d-flex justify-content-between align-items-center mb-3">
                        <div class="form-check">
                          <input class="form-check-input" type="checkbox" id="rememberMe">
                          <label class="form-check-label" for="rememberMe">Remember me</label>
                        </div>
                        <a href="#" class="text-decoration-none">Forgot password?</a>
                      </div>

                      <button type="submit" class="btn btn-primary w-100">Login</button>
                    </form>
                  </div>

                  <!-- Registration Form -->
                  <div class="tab-pane fade" id="register" role="tabpanel">
                    <h4 class="mb-3">Register</h4>
                    <form>
                      <div class="row g-3">
                        <div class="col-12 col-md-6">
                          <label class="form-label">First Name</label>
                          <input type="text" class="form-control" placeholder="First name" required>
                        </div>
                        <div class="col-12 col-md-6">
                          <label class="form-label">Last Name</label>
                          <input type="text" class="form-control" placeholder="Last name" required>
                        </div>
                      </div>

                      <div class="mb-3 mt-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" placeholder="Enter email" required>
                      </div>

                      <div class="row g-3">
                        <div class="col-12 col-md-6">
                          <label class="form-label">Password</label>
                          <input type="password" class="form-control" placeholder="Password" required>
                        </div>
                        <div class="col-12 col-md-6">
                          <label class="form-label">Confirm Password</label>
                          <input type="password" class="form-control" placeholder="Confirm password" required>
                        </div>
                      </div>

                      <div class="mb-3 mt-3">
                        <label class="form-label">Phone</label>
                        <input type="tel" class="form-control" placeholder="Phone number" required>
                      </div>

                      <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="terms" required>
                        <label class="form-check-label" for="terms">
                          I agree to the Terms & Conditions
                        </label>
                      </div>

                      <button type="submit" class="btn btn-success w-100">Create Account</button>
                    </form>
                  </div>

                </div><!-- tab-content -->

              </div><!-- card-body -->
            </div><!-- card -->
          </div>

        </div><!-- row -->
      </div><!-- col -->
    </div><!-- row -->
  </div><!-- container -->

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
