<!DOCTYPE html>
<html>

<head>
    <title>{% if post %}Edit{% else %}Create{% endif %} Post</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 40px;
            background: #f8f9fa;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1em;
        }

        textarea {
            height: 200px;
            resize: vertical;
        }

        .btn {
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 6px;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1em;
        }

        .btn-save {
            background: #28a745;
        }

        .btn-cancel {
            background: #6c757d;
            margin-left: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>{% if post %}Edit Post{% else %}Create New Post{% endif %}</h1>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Title</label>
                <input type="text" name="title" value="{{ post.title|default:'' }}" required>
            </div>
            <div class="form-group">
                <label>Content</label>
                <textarea name="content" required>{{ post.content|default:'' }}</textarea>
            </div>
            <button type="submit" class="btn btn-save">Save Post</button>
            <a href="{% url 'post_list' %}" class="btn btn-cancel">Cancel</a>
        </form>
    </div>
</body>

</html>
