<!DOCTYPE html>
<html>

<head>
    <title>{{ post.title }} - Blog Detail</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 40px;
            background: #f8f9fa;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .post-header {
            border-bottom: 2px solid #eee;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .post-title {
            font-size: 2.5em;
            margin: 0;
            color: #333;
        }

        .post-meta {
            color: #6c757d;
            margin-top: 10px;
        }

        .post-content {
            line-height: 1.8;
            font-size: 1.1em;
            color: #444;
        }

        .actions {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .btn {
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 6px;
            color: white;
            display: inline-block;
            margin-right: 10px;
            font-size: 0.9em;
        }

        .btn-edit {
            background: #ffc107;
            color: #212529;
        }

        .btn-delete {
            background: #dc3545;
        }

        .btn-back {
            background: #6c757d;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="post-header">
            <h1 class="post-title">{{ post.title }}</h1>
            <div class="post-meta">
                Written by <strong>{{ post.author.username }}</strong> | {{ post.created_at|date:"F d, Y H:i" }}
            </div>
        </div>

        <div class="post-content">
            {{ post.content|linebreaks }}
        </div>

        <div class="actions">
            {% if user == post.author or user.is_staff %}
            <a href="{% url 'post_edit' post.id %}" class="btn btn-edit">Edit Post</a>
            <a href="{% url 'post_delete' post.id %}" class="btn btn-delete">Delete Post</a>
            {% endif %}
            <a href="{% url 'post_list' %}" class="btn btn-back">Back to List</a>
        </div>
    </div>
</body>

</html>
