<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Theme Changer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            transition: 0.4s;
        }

        .container {
            text-align: center;
            margin-top: 100px;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }

        /* Default Light Theme */
        .light {
            background-color: white;
            color: black;
        }

        /* Dark Theme */
        .dark {
            background-color: #121212;
            color: white;
        }

        /* Blue Theme */
        .blue {
            background-color: #1e3a8a;
            color: white;
        }
    </style>
</head>

<body class="light">

    <div class="container">
        <h2>Dynamic Theme Changer</h2>
        <p>Click a button to change theme</p>

        <button onclick="setTheme('light')">Light</button>
        <button onclick="setTheme('dark')">Dark</button>
        <button onclick="setTheme('blue')">Blue</button>
    </div>

    <script>
        function setTheme(themeName) {
            document.body.className = themeName;
        }
    </script>

</body>
</html>
