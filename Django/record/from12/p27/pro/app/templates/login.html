<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    :root{
      --bg:#0f172a;
      --card:#111827;
      --text:#e5e7eb;
      --muted:#9ca3af;
      --border:#2b3446;
      --btn:#22c55e;
    }
    body.light{
      --bg:#f3f4f6;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --border:#d1d5db;
      --btn:#2563eb;
    }

    body{
      margin:0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    .card{
      width: 360px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
    }
    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:10px;
    }
    input{
      width:100%;
      padding:10px;
      border-radius:10px;
      border:1px solid var(--border);
      background: transparent;
      color: var(--text);
      margin: 8px 0;
      outline:none;
    }
    button{
      width:100%;
      padding:10px;
      border:none;
      border-radius:10px;
      background: var(--btn);
      color: white;
      font-weight:700;
      cursor:pointer;
      margin-top: 8px;
    }
    .toggle{
      border:1px solid var(--border);
      background: transparent;
      color: var(--text);
      width:auto;
      padding:8px 10px;
      border-radius:10px;
      cursor:pointer;
      font-weight:600;
      margin-top:0;
    }
    .error{
      color:#ef4444;
      font-size: 13px;
      margin-top: 6px;
    }
    .muted{
      color: var(--muted);
      font-size: 12px;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="top">
      <h3 style="margin:0;">Login</h3>
      <button class="toggle" type="button" id="themeBtn">🌙/☀️</button>
    </div>

    <form method="POST">
      {% csrf_token %}
      <input type="text" name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Login</button>

      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}
    </form>

    <div class="muted">
      Create user from admin: /admin → Users → Add
    </div>
  </div>

  <script>
    // theme saved in localStorage
    const saved = localStorage.getItem("theme");
    if (saved === "light") document.body.classList.add("light");

    document.getElementById("themeBtn").addEventListener("click", () => {
      document.body.classList.toggle("light");
      localStorage.setItem("theme", document.body.classList.contains("light") ? "light" : "dark");
    });
  </script>
</body>
</html>
