<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f5f7;
            color: #1f2937;
            min-height: 100vh;
            display: grid;
            place-items: center;
        }
        .card {
            width: 360px;
            background: #ffffff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 24px rgba(0,0,0,0.12);
        }
        h2 { margin-top: 0; }
        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
        }
        button {
            border: none;
            background: #0f766e;
            color: white;
            cursor: pointer;
        }
        .error { color: #dc2626; margin-top: 10px; }
        .hint { color: #6b7280; font-size: 14px; margin-top: 8px; }
        a { color: #0f766e; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Login</h2>

        <form method="post">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        {% if error %}<p class="error">{{ error }}</p>{% endif %}
        <p class="hint">No account? <a href="{% url 'register' %}">Register</a></p>
    </div>
</body>
</html>
