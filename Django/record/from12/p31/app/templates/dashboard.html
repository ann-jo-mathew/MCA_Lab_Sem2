<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f5f7;
            color: #1f2937;
        }
        .wrap {
            max-width: 420px;
            margin: 60px auto;
            background: #ffffff;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 10px 24px rgba(0,0,0,0.12);
            text-align: center;
        }
        a {
            display: inline-block;
            margin-top: 12px;
            padding: 10px 14px;
            text-decoration: none;
            color: #fff;
            background: #0f766e;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <h2>Dashboard</h2>
        <p>User: <b>{{ request.user.username }}</b></p>
        <p>Role: <b>{{ role }}</b></p>
        <a href="{% url 'logout' %}">Logout</a>
    </div>
</body>
</html>
