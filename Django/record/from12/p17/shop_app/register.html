<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script type="module" src="https://cdn.jsdelivr.net/npm/@material/web/all.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="setNavbarUserInfo()">

  <div class="topbar">
    <div class="container py-3 d-flex justify-content-between align-items-center">
      <div class="brand">Shop App</div>
      <div class="d-flex gap-2 align-items-center">
        <span id="navUser" class="badge-role">Guest</span>
        <a class="btn btn-outline-primary" href="home.html">Home</a>
        <a class="btn btn-outline-primary" href="products.html">Products</a>
        <button id="btnLogout" class="btn btn-danger d-none" onclick="logout()">Logout</button>
      </div>
    </div>
  </div>

  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">
        <md-elevated-card class="card-pad shadow-sm">
          <h4 class="mb-3">Registration</h4>
          <div id="msg" class="text-danger mb-2"></div>

          <form id="regForm">
            <div class="mb-3">
              <md-outlined-text-field id="name" label="Full Name" style="width:100%;"></md-outlined-text-field>
            </div>

            <div class="mb-3">
              <md-outlined-text-field id="email" label="Email" type="email" style="width:100%;"></md-outlined-text-field>
            </div>

            <div class="row g-3">
              <div class="col-12 col-md-6">
                <md-outlined-text-field id="password" label="Password (min 6)" type="password" style="width:100%;"></md-outlined-text-field>
              </div>
              <div class="col-12 col-md-6">
                <md-outlined-text-field id="confirm" label="Confirm Password" type="password" style="width:100%;"></md-outlined-text-field>
              </div>
            </div>

            <div class="mt-3 mb-3">
              <label class="form-label fw-semibold">Role</label>
              <select id="role" class="form-select">
                <option value="user">User</option>
                <option value="admin">Admin</option>
              </select>
              <div class="muted mt-1">Admin registration allowed for demo assignment.</div>
            </div>

            <div class="d-flex gap-2">
              <md-filled-button type="submit">Create Account</md-filled-button>
              <md-outlined-button type="button" onclick="location.href='login.html'">Go to Login</md-outlined-button>
            </div>
          </form>
        </md-elevated-card>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    document.getElementById("regForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const msg = document.getElementById("msg");
      msg.textContent = "";

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirm = document.getElementById("confirm").value;
      const role = document.getElementById("role").value;

      // Simple validation
      if (!name || !email || !password || !confirm) {
        msg.textContent = "All fields are required.";
        return;
      }
      if (!email.includes("@")) {
        msg.textContent = "Enter a valid email.";
        return;
      }
      if (password.length < 6) {
        msg.textContent = "Password must be at least 6 characters.";
        return;
      }
      if (password !== confirm) {
        msg.textContent = "Passwords do not match.";
        return;
      }

      const res = addUser({ name, email, password, role });
      if (!res.ok) {
        msg.textContent = res.msg;
        return;
      }

      alert("Registered successfully. Now login.");
      window.location.href = "login.html";
    });
  </script>
</body>
</html>
