<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Product</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script type="module" src="https://cdn.jsdelivr.net/npm/@material/web/all.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="requireAdmin(); setNavbarUserInfo(); loadProduct();">

  <div class="topbar">
    <div class="container py-3 d-flex justify-content-between align-items-center">
      <div class="brand">Shop App</div>
      <div class="d-flex gap-2 align-items-center">
        <span id="navUser" class="badge-role">Guest</span>
        <a class="btn btn-outline-primary" href="products.html">Products</a>
        <button id="btnLogout" class="btn btn-danger d-none" onclick="logout()">Logout</button>
      </div>
    </div>
  </div>

  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-7">
        <md-elevated-card class="card-pad shadow-sm">
          <h4 class="mb-3">Edit Product</h4>
          <div id="msg" class="text-danger mb-2"></div>

          <form id="editForm">
            <div class="mb-3">
              <md-outlined-text-field id="name" label="Product Name" style="width:100%;"></md-outlined-text-field>
            </div>

            <div class="mb-3">
              <md-outlined-text-field id="price" label="Price" type="number" style="width:100%;"></md-outlined-text-field>
            </div>

            <div class="mb-3">
              <md-outlined-text-field id="image" label="Image URL" style="width:100%;"></md-outlined-text-field>
            </div>

            <div class="mb-3">
              <md-outlined-text-field id="desc" label="Description" style="width:100%;" textarea rows="3"></md-outlined-text-field>
            </div>

            <div class="d-flex gap-2">
              <md-filled-button type="submit">Update</md-filled-button>
              <md-outlined-button type="button" onclick="location.href='products.html'">Cancel</md-outlined-button>
            </div>
          </form>
        </md-elevated-card>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    const productId = getQueryParam("id");

    function loadProduct() {
      const msg = document.getElementById("msg");
      msg.textContent = "";

      if (!productId) {
        msg.textContent = "Missing product id.";
        return;
      }

      const p = getProductById(productId);
      if (!p) {
        msg.textContent = "Product not found.";
        return;
      }

      document.getElementById("name").value = p.name;
      document.getElementById("price").value = p.price;
      document.getElementById("image").value = p.image;
      document.getElementById("desc").value = p.desc;
    }

    document.getElementById("editForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const msg = document.getElementById("msg");
      msg.textContent = "";

      const name = document.getElementById("name").value.trim();
      const price = Number(document.getElementById("price").value);
      const image = document.getElementById("image").value.trim();
      const desc = document.getElementById("desc").value.trim();

      if (!name || !price || price <= 0) {
        msg.textContent = "Name and valid price are required.";
        return;
      }

      updateProduct(productId, { name, price, image, desc });
      alert("Product updated!");
      window.location.href = "products.html";
    });
  </script>
</body>
</html>
