<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script type="module" src="https://cdn.jsdelivr.net/npm/@material/web/all.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="setNavbarUserInfo(); renderCart('cartList');">

  <div class="topbar">
    <div class="container py-3 d-flex justify-content-between align-items-center">
      <div class="brand">Shop App</div>
      <div class="d-flex gap-2 align-items-center">
        <span id="navUser" class="badge-role">Guest</span>
        <a class="btn btn-outline-primary" href="products.html">Products</a>
        <a class="btn btn-outline-primary" href="home.html">Home</a>
        <button id="btnLogout" class="btn btn-danger d-none" onclick="logout()">Logout</button>
      </div>
    </div>
  </div>

  <div class="container py-4">
    <h3 class="mb-3">Cart</h3>

    <div id="cartList"></div>

    <md-elevated-card class="card-pad">
      <div class="d-flex justify-content-between align-items-center">
        <div class="fw-bold">Total:</div>
        <div id="cartTotal" class="fw-bold">₹0</div>
      </div>

      <div class="d-flex gap-2 mt-3">
        <md-filled-button onclick="clearCart(); renderCart('cartList');">Clear Cart</md-filled-button>
        <md-outlined-button onclick="location.href='products.html'">Continue Shopping</md-outlined-button>
      </div>
    </md-elevated-card>
  </div>

  <script src="app.js"></script>
</body>
</html>
