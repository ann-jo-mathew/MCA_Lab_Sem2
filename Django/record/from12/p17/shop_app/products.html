<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Products</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script type="module" src="https://cdn.jsdelivr.net/npm/@material/web/all.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="setNavbarUserInfo(); renderProducts('productsGrid');">

  <div class="topbar">
    <div class="container py-3 d-flex justify-content-between align-items-center">
      <div class="brand">Shop App</div>
      <div class="d-flex gap-2 align-items-center">
        <span id="navUser" class="badge-role">Guest</span>
        <a class="btn btn-outline-primary" href="home.html">Home</a>
        <a class="btn btn-outline-secondary" href="cart.html">Cart</a>

        <a class="btn btn-success d-none" data-admin-only="1" href="add-product.html">Add Product</a>

        <a class="btn btn-primary" href="login.html">Login</a>
        <a class="btn btn-outline-success" href="register.html">Register</a>
        <button id="btnLogout" class="btn btn-danger d-none" onclick="logout()">Logout</button>
      </div>
    </div>
  </div>

  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-end mb-3">
      <div>
        <h3 class="mb-0">Product Listing</h3>
        <div class="muted">Products are rendered dynamically from LocalStorage.</div>
      </div>
    </div>

    <div id="productsGrid" class="row g-3"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
