<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script type="module" src="https://cdn.jsdelivr.net/npm/@material/web/all.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body onload="setNavbarUserInfo()">

  <div class="topbar">
    <div class="container py-3 d-flex justify-content-between align-items-center">
      <div class="brand">Shop App</div>
      <div class="d-flex gap-2 align-items-center">
        <span id="navUser" class="badge-role">Guest</span>
        <a class="btn btn-outline-primary" href="home.html">Home</a>
        <a class="btn btn-outline-primary" href="products.html">Products</a>
        <a class="btn btn-outline-secondary" href="cart.html">Cart</a>
        <button id="btnLogout" class="btn btn-danger d-none" onclick="logout()">Logout</button>
      </div>
    </div>
  </div>

  <div class="container py-4">
    <div class="row justify-content-center">
      <div class="col-12 col-md-7 col-lg-5">
        <md-elevated-card class="card-pad shadow-sm">
          <h4 class="mb-3">Login</h4>

          <div id="msg" class="text-danger mb-2"></div>

          <form id="loginForm">
            <div class="mb-3">
              <md-outlined-text-field id="email" label="Email" type="email" style="width:100%;"></md-outlined-text-field>
            </div>

            <div class="mb-3">
              <md-outlined-text-field id="password" label="Password" type="password" style="width:100%;"></md-outlined-text-field>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Role</label>
              <select id="role" class="form-select">
                <option value="user">User</option>
                <option value="admin">Admin</option>
              </select>
            </div>

            <div class="d-flex gap-2">
              <md-filled-button type="submit">Login</md-filled-button>
              <md-outlined-button type="button" onclick="location.href='register.html'">Register</md-outlined-button>
            </div>
          </form>
        </md-elevated-card>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    document.getElementById("loginForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const msg = document.getElementById("msg");
      msg.textContent = "";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const role = document.getElementById("role").value;

      if (!email || !password) {
        msg.textContent = "Email and password are required.";
        return;
      }

      const res = loginUser(email, password, role);
      if (!res.ok) {
        msg.textContent = res.msg;
        return;
      }

      // Redirect based on role
      if (role === "admin") window.location.href = "products.html";
      else window.location.href = "products.html";
    });
  </script>
</body>
</html>
