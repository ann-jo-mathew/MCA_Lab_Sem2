<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Home</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script type="module" src="https://cdn.jsdelivr.net/npm/@material/web/all.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body onload="setNavbarUserInfo()">

  <div class="topbar">
    <div class="container py-3 d-flex justify-content-between align-items-center">
      <div class="brand">Shop App</div>
      <div class="d-flex gap-2 align-items-center">
        <span id="navUser" class="badge-role">Guest</span>
        <a class="btn btn-outline-primary" href="products.html">Products</a>
        <a class="btn btn-outline-secondary" href="cart.html">Cart</a>

        <a class="btn btn-primary" href="login.html">Login</a>
        <a class="btn btn-success" href="register.html">Register</a>

        <button id="btnLogout" class="btn btn-danger d-none" onclick="logout()">Logout</button>
      </div>
    </div>
  </div>

  <div class="container py-4">
    <div class="row g-3">
      <div class="col-12">
        <md-elevated-card class="card-pad shadow-sm">
          <h3 class="mb-2">Welcome</h3>
          <p class="muted mb-3">
            This app uses Bootstrap 5 for layout, Material Design components for UI,
            and LocalStorage for CRUD (Users, Products, Cart).
          </p>
          <div class="d-flex gap-2">
            <md-filled-button onclick="location.href='products.html'">Browse Products</md-filled-button>
            <md-outlined-button onclick="location.href='login.html'">Login</md-outlined-button>
          </div>
          <hr>
          <div class="muted">
            Admin demo login: <b>admin@demo.com</b> / <b>Admin@123</b>
          </div>
        </md-elevated-card>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
